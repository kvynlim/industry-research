<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Hessian spectrum and observability</title>
  <desc id="desc">The Hessian spectrum separates well-constrained directions, weakly constrained directions, and nullspaces that require damping, priors, or better excitation.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <pattern id="fineGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="620" fill="#f8fafc"/>
  <rect x="38" y="34" width="1124" height="552" rx="18" fill="#ffffff" stroke="#d9e2ef" filter="url(#shadow)"/>
  <text x="70" y="84" font-size="30" font-weight="800" fill="#0f172a">Hessian spectrum and observability</text>
  <rect x="70" y="104" width="1060" height="2" fill="#dbeafe"/>

<line x1="120" y1="416" x2="1018" y2="416" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="120" y1="416" x2="120" y2="176" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="170" y="245" width="58" height="170" rx="6" fill="#2563eb"/>
<rect x="250" y="292" width="58" height="123" rx="6" fill="#2563eb"/>
<rect x="330" y="326" width="58" height="89" rx="6" fill="#2563eb"/>
<rect x="520" y="372" width="58" height="43" rx="6" fill="#f59e0b"/>
<rect x="600" y="386" width="58" height="29" rx="6" fill="#f59e0b"/>
<rect x="790" y="408" width="58" height="7" rx="6" fill="#ef4444"/>
<rect x="870" y="410" width="58" height="5" rx="6" fill="#ef4444"/>
<text x="150" y="158" text-anchor="start" font-size="14" font-weight="600" fill="#475569">eigenvalue magnitude</text>
<text x="845" y="456" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">Hessian eigen-directions</text>
<rect x="132" y="132" width="270" height="80" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="267" y="162" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">Well-constrained</text>
<text x="267" y="183" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">directions</text>
<text x="267" y="187" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">stable pose,</text>
<text x="267" y="203" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">landmark,</text>
<rect x="458" y="132" width="250" height="80" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="583" y="162" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">Weak directions</text>
<text x="583" y="187" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">poor baseline or</text>
<text x="583" y="203" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">scaling</text>
<rect x="748" y="132" width="250" height="80" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
<text x="873" y="162" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">Nullspace</text>
<text x="873" y="187" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">gauge or missing</text>
<text x="873" y="203" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">prior</text>
<path d="M265 418 C265 470 520 480 548 420" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="410" y="506" text-anchor="middle" font-size="15" font-weight="600" fill="#475569">large gap gives high condition number</text>
<rect x="844" y="486" width="232" height="56" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
<text x="960" y="520" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">Response: add damping, priors, or</text>
<text x="960" y="538" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">excitation</text>


</svg>
