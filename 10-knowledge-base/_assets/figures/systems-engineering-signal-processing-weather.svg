<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Weather signal-processing chain</title>
  <desc id="desc">The weather-processing recommendations form a chain from dual-return evidence through DSOR and LIOR cleanup, temporal filtering, severity classification, and degraded-mode response.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <pattern id="fineGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="620" fill="#f8fafc"/>
  <rect x="38" y="34" width="1124" height="552" rx="18" fill="#ffffff" stroke="#d9e2ef" filter="url(#shadow)"/>
  <text x="70" y="84" font-size="30" font-weight="800" fill="#0f172a">Weather signal-processing chain</text>
  <rect x="70" y="104" width="1060" height="2" fill="#dbeafe"/>

<rect x="74" y="214" width="150" height="126" rx="12" fill="#eff6ff" stroke="#2f6fd6" stroke-width="2"/>
<text x="149" y="244" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">Dual returns</text>
<text x="149" y="269" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">range + intensity</text>
<text x="149" y="285" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">checks</text>
<rect x="258" y="214" width="150" height="126" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="333" y="244" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">DSOR</text>
<text x="333" y="269" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">range-adaptive</text>
<text x="333" y="285" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">density cleanup</text>
<rect x="442" y="214" width="150" height="126" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="517" y="244" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">LIOR</text>
<text x="517" y="269" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">low-intensity</text>
<text x="517" y="285" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">outlier removal</text>
<rect x="626" y="214" width="150" height="126" rx="12" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
<text x="701" y="244" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">Temporal filter</text>
<text x="701" y="269" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">persistence across</text>
<text x="701" y="285" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">scans</text>
<rect x="810" y="214" width="150" height="126" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="885" y="244" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">Weather state</text>
<text x="885" y="269" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">clear / rain / fog /</text>
<text x="885" y="285" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">exhaust</text>
<rect x="994" y="214" width="128" height="126" rx="12" fill="#ffe4e6" stroke="#e11d48" stroke-width="2"/>
<text x="1058" y="244" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">Degraded</text>
<text x="1058" y="265" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">response</text>
<text x="1058" y="269" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">planner + health</text>
<text x="1058" y="285" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">monitor</text>
<line x1="226" y1="277" x2="256" y2="277" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="410" y1="277" x2="440" y2="277" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="594" y1="277" x2="624" y2="277" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="778" y1="277" x2="808" y2="277" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="962" y1="277" x2="992" y2="277" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="82" y="378" width="126" height="32" rx="16" fill="#dbeafe" stroke="#94a3b8"/>
<text x="145" y="399" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">first/last gap</text>
<rect x="268" y="378" width="128" height="32" rx="16" fill="#dcfce7" stroke="#94a3b8"/>
<text x="332" y="399" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">density vs range</text>
<rect x="454" y="378" width="126" height="32" rx="16" fill="#fed7aa" stroke="#94a3b8"/>
<text x="517" y="399" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">weak returns</text>
<rect x="632" y="378" width="138" height="32" rx="16" fill="#cffafe" stroke="#94a3b8"/>
<text x="701" y="399" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">N-frame evidence</text>
<rect x="824" y="378" width="122" height="32" rx="16" fill="#ede9fe" stroke="#94a3b8"/>
<text x="885" y="399" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">hysteresis</text>
<rect x="1000" y="378" width="116" height="32" rx="16" fill="#ffe4e6" stroke="#94a3b8"/>
<text x="1058" y="399" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">slow/stop mode</text>
<path d="M885 212 C872 166 746 152 666 182" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="760" y="154" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">state feeds adaptive thresholds back into</text>
<text x="760" y="171" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">cleanup</text>
<polyline points="96,480 142,456 188,466 234,432 280,446 326,404" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
<polyline points="414,480 460,478 506,458 552,430 598,428 644,392" fill="none" stroke="#0f766e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
<text x="390" y="520" text-anchor="middle" font-size="15" font-weight="600" fill="#475569">noisy evidence becomes a stable operational state</text>

</svg>
