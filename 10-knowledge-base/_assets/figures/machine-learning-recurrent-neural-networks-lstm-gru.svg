<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Recurrent hidden-state flow</title>
  <desc id="desc">how RNN, LSTM, and GRU models carry temporal memory across a sequence.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="620" fill="#f8fafc"/>
  <rect x="36" y="34" width="1128" height="552" rx="28" fill="#ffffff" stroke="#d8dee9" filter="url(#shadow)"/>
  <text x="70" y="88" font-size="32" font-weight="800" fill="#0f172a">Recurrent hidden-state flow</text>
  <rect x="70" y="108" width="1060" height="2" fill="#dbeafe"/>
  <line x1="95" y1="330" x2="1110" y2="330" stroke="#0f172a" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="120" y1="330" x2="120" y2="210" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 8"/>
<circle cx="120" cy="330" r="14" fill="#2563eb"/>
<rect x="42" y="168" width="156" height="84" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="120" y="204" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">input t</text>
<line x1="350" y1="330" x2="350" y2="420" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 8"/>
<circle cx="350" cy="330" r="14" fill="#2563eb"/>
<rect x="272" y="378" width="156" height="84" rx="18" fill="#dcfce7" stroke="#2563eb" stroke-width="2"/>
<text x="350" y="414" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">hidden state</text>
<line x1="580" y1="330" x2="580" y2="210" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 8"/>
<circle cx="580" cy="330" r="14" fill="#2563eb"/>
<rect x="502" y="168" width="156" height="84" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="580" y="204" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">gates</text>
<line x1="810" y1="330" x2="810" y2="420" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 8"/>
<circle cx="810" cy="330" r="14" fill="#2563eb"/>
<rect x="732" y="378" width="156" height="84" rx="18" fill="#dcfce7" stroke="#2563eb" stroke-width="2"/>
<text x="810" y="414" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">output t</text>
<line x1="1040" y1="330" x2="1040" y2="210" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 8"/>
<circle cx="1040" cy="330" r="14" fill="#2563eb"/>
<rect x="962" y="168" width="156" height="84" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="1040" y="204" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">state reset</text>
<text x="1090" y="375" text-anchor="end" font-size="20" font-weight="700" fill="#334155">time</text>
</svg>
