<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">World-model evaluation modes</title>
  <desc id="desc">how predictive quality, closed-loop behavior, planner costs, and uncertainty must be evaluated together.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="620" fill="#f8fafc"/>
  <rect x="36" y="34" width="1128" height="552" rx="28" fill="#ffffff" stroke="#d8dee9" filter="url(#shadow)"/>
  <text x="70" y="88" font-size="32" font-weight="800" fill="#0f172a">World-model evaluation modes</text>
  <rect x="70" y="108" width="1060" height="2" fill="#dbeafe"/>
  <rect x="90" y="280" width="190" height="96" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="185" y="322" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">open loop</text>
<rect x="450" y="170" width="220" height="92" rx="18" fill="#dcfce7" stroke="#2563eb" stroke-width="2"/>
<text x="560" y="210" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">closed loop</text>
<rect x="450" y="310" width="220" height="92" rx="18" fill="#fef3c7" stroke="#2563eb" stroke-width="2"/>
<text x="560" y="350" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">action</text>
<text x="560" y="373" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">condition</text>
<rect x="450" y="450" width="220" height="92" rx="18" fill="#ede9fe" stroke="#2563eb" stroke-width="2"/>
<text x="560" y="490" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">planning cost</text>
<rect x="890" y="310" width="220" height="96" rx="18" fill="#fee2e2" stroke="#2563eb" stroke-width="2"/>
<text x="1000" y="352" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">uncertainty</text>
<line x1="282" y1="328" x2="448" y2="216" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="282" y1="328" x2="448" y2="356" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="282" y1="328" x2="448" y2="496" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="672" y1="216" x2="888" y2="356" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="672" y1="356" x2="888" y2="356" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="672" y1="496" x2="888" y2="356" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>
