<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Bayesian ESKF cycle</title>
  <desc id="desc">how filters propagate nominal state, estimate error-state corrections, and reset after measurement updates.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="620" fill="#f8fafc"/>
  <rect x="36" y="34" width="1128" height="552" rx="28" fill="#ffffff" stroke="#d8dee9" filter="url(#shadow)"/>
  <text x="70" y="88" font-size="32" font-weight="800" fill="#0f172a">Bayesian ESKF cycle</text>
  <rect x="70" y="108" width="1060" height="2" fill="#dbeafe"/>
  <rect x="86" y="245" width="176" height="104" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="174" y="291" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">predict</text>
<line x1="269" y1="297" x2="288" y2="297" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="296" y="245" width="176" height="104" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="384" y="291" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">error state</text>
<line x1="479" y1="297" x2="498" y2="297" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="506" y="245" width="176" height="104" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="594" y="291" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">measurement</text>
<line x1="689" y1="297" x2="708" y2="297" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="716" y="245" width="176" height="104" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="804" y="291" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">covariance</text>
<line x1="899" y1="297" x2="918" y2="297" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="926" y="245" width="176" height="104" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="1014" y="291" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">reset</text>

<path d="M1006 372 C1006 470 178 470 178 372" fill="none" stroke="#0f766e" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="590" y="500" text-anchor="middle" font-size="18" font-weight="700" fill="#0f766e">feedback</text>
</svg>
