<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Normal-equation factorization path</title>
  <desc id="desc">Normal equations turn residual Jacobians into an SPD system only when the problem is well constrained; Cholesky and LDLT expose conditioning and indefiniteness.</desc>
