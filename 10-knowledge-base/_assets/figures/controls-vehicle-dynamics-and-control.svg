<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Vehicle model fidelity ladder</title>
  <desc id="desc">how control models move from simple path tracking to force, slip, and actuator-limited vehicle behavior.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="620" fill="#f8fafc"/>
  <rect x="36" y="34" width="1128" height="552" rx="28" fill="#ffffff" stroke="#d8dee9" filter="url(#shadow)"/>
  <text x="70" y="88" font-size="32" font-weight="800" fill="#0f172a">Vehicle model fidelity ladder</text>
  <rect x="70" y="108" width="1060" height="2" fill="#dbeafe"/>
  <rect x="370" y="150" width="460" height="70" rx="16" fill="#dbeafe" stroke="#334155" stroke-width="1.5"/>
<text x="600" y="193" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">kinematic bicycle</text>
<rect x="370" y="238" width="460" height="70" rx="16" fill="#dcfce7" stroke="#334155" stroke-width="1.5"/>
<text x="600" y="281" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">dynamic bicycle</text>
<rect x="370" y="326" width="460" height="70" rx="16" fill="#fef3c7" stroke="#334155" stroke-width="1.5"/>
<text x="600" y="369" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">tire forces</text>
<rect x="370" y="414" width="460" height="70" rx="16" fill="#ede9fe" stroke="#334155" stroke-width="1.5"/>
<text x="600" y="457" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">actuators</text>
<rect x="370" y="502" width="460" height="70" rx="16" fill="#fee2e2" stroke="#334155" stroke-width="1.5"/>
<text x="600" y="545" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">controller</text>
<line x1="600" y1="128" x2="600" y2="565" stroke="#0f766e" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>
