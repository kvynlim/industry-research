<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc" data-diagram-kind="error-budget">
  <title id="title">Sensor Foundations for Autonomy</title>
  <desc id="desc">section-level autonomy-role diagram showing sensor foundations, autonomy problem classes, stack interfaces, reading paths, and failure diagnosis.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#be123c"/>
    </marker>
  </defs>
  <rect width="1400" height="720" fill="#f8fafc"/>
  <rect x="54" y="48" width="1292" height="624" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="92" y="96" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Sensor Foundations for Autonomy</text>
  <text x="92" y="128" font-family="Arial, sans-serif" font-size="16" fill="#475569">Measurement likelihoods, error budgets, observability, and degradation contracts.</text>
  <!-- layout:error-budget -->
  <rect x="116" y="198" width="190" height="90" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="211" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">Physical signal</text>
  <text x="211" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">light, range, inertia</text>
  <rect x="370" y="198" width="190" height="90" rx="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="465" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">Measurement</text>
  <text x="465" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">value and timestamp</text>
  <rect x="624" y="198" width="190" height="90" rx="14" fill="#ffe4e6" stroke="#be123c" stroke-width="2"/>
  <text x="719" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">Error budget</text>
  <text x="719" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">noise, bias, drift</text>
  <rect x="878" y="198" width="190" height="90" rx="14" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="973" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">Likelihood</text>
  <text x="973" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">covariance and confidence</text>
  <rect x="1132" y="198" width="190" height="90" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="1227" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">Fusion gate</text>
  <text x="1227" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">accept or reject</text>
  <line x1="306" y1="243" x2="362" y2="243" stroke="#be123c" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="560" y1="243" x2="616" y2="243" stroke="#be123c" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="814" y1="243" x2="870" y2="243" stroke="#be123c" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1068" y1="243" x2="1124" y2="243" stroke="#be123c" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="150" y="394" width="284" height="138" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="174" y="430" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Degradation modes</text>
  <text x="174" y="464" font-family="Arial, sans-serif" font-size="14" fill="#334155">rain, glare, multipath, vibration</text>
  <text x="174" y="494" font-family="Arial, sans-serif" font-size="14" fill="#334155">occlusion and calibration drift</text>
  <rect x="520" y="394" width="320" height="138" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="544" y="430" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Review focus</text>
  <text x="544" y="464" font-family="Arial, sans-serif" font-size="14" fill="#334155">likelihood contracts and observability</text>
  <text x="544" y="494" font-family="Arial, sans-serif" font-size="14" fill="#334155">confidence matched to conditions</text>
  <rect x="926" y="394" width="284" height="138" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="950" y="430" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Failure diagnosis</text>
  <text x="950" y="464" font-family="Arial, sans-serif" font-size="14" fill="#334155">valid returns gated out</text>
  <text x="950" y="494" font-family="Arial, sans-serif" font-size="14" fill="#334155">dry-road contract reused in rain</text>
</svg>

