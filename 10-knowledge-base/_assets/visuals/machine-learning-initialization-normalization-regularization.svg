<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc" data-diagram-kind="signal-flow-depth">
  <title id="title">signal/gradient variance through depth</title>
  <desc id="desc">signal/gradient variance through depth showing Xavier/He initialization, normalization layers, dropout/weight decay, and unstable training failure.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1400" height="720" fill="#f8fafc"/>
  <rect x="42" y="38" width="1316" height="644" rx="20" fill="#ffffff" stroke="#d9e2ef" filter="url(#shadow)"/>
  <text x="80" y="88" font-size="30" font-weight="800" fill="#0f172a">signal/gradient variance through depth</text>
  <text x="80" y="122" font-size="16" font-weight="600" fill="#475569">signal/gradient variance through depth showing Xavier/He initialization, normalization layers, dropout/weight decay, and unstable training failure.</text>
  <rect x="80" y="144" width="1240" height="2" fill="#dbeafe"/>

<!-- layout:signal-flow-depth -->
<rect x="183" y="258" width="170" height="92" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="268" y="310" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">Xavier/He</text>
<text x="268" y="328" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">initialization</text>

<line x1="357" y1="304" x2="391" y2="304" stroke="#64748b" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="399" y="258" width="170" height="92" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="484" y="310" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">normalization</text>
<text x="484" y="328" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">layers</text>

<line x1="573" y1="304" x2="607" y2="304" stroke="#64748b" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="615" y="258" width="170" height="92" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="700" y="310" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">dropout/weight</text>
<text x="700" y="328" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">decay</text>

<line x1="789" y1="304" x2="823" y2="304" stroke="#64748b" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="831" y="258" width="170" height="92" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
<text x="916" y="310" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">and unstable</text>
<text x="916" y="328" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">training failure</text>

<line x1="1005" y1="304" x2="1039" y2="304" stroke="#64748b" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="1047" y="258" width="170" height="92" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="1132" y="310" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">Initialization</text>


<polyline points="180,520 300,480 420,536 540,470 660,530 780,486 900,526 1020,472 1140,520" fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
<text x="700" y="608" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">activation and gradient signal depth</text>

</svg>
