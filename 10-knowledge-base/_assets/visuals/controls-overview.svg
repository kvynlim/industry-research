<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc" data-diagram-kind="closed-loop-control">
  <title id="title">Control Foundations for Autonomy</title>
  <desc id="desc">section-level autonomy-role diagram showing control foundations, autonomy problem classes, stack interfaces, reading paths, and failure diagnosis.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#1d4ed8"/>
    </marker>
  </defs>
  <rect width="1400" height="720" fill="#f8fafc"/>
  <rect x="54" y="48" width="1292" height="624" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="92" y="96" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Control Foundations for Autonomy</text>
  <text x="92" y="128" font-family="Arial, sans-serif" font-size="16" fill="#475569">Closed-loop feasibility from planned trajectory to bounded actuator command.</text>
  <!-- layout:closed-loop-control -->
  <rect x="114" y="214" width="180" height="96" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="204" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">State estimate</text>
  <text x="204" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">pose, speed, yaw</text>
  <rect x="364" y="214" width="186" height="96" rx="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="457" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">Reference contract</text>
  <text x="457" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">path, speed, timing</text>
  <rect x="620" y="214" width="186" height="96" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="713" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">Dynamics model</text>
  <text x="713" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">tires, delay, limits</text>
  <rect x="876" y="214" width="186" height="96" rx="14" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="969" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">MPC or iLQR</text>
  <text x="969" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">costs, constraints</text>
  <rect x="1132" y="214" width="166" height="96" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="1215" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">Actuators</text>
  <text x="1215" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">steer, brake, drive</text>
  <line x1="294" y1="262" x2="356" y2="262" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="550" y1="262" x2="612" y2="262" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="806" y1="262" x2="868" y2="262" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1062" y1="262" x2="1124" y2="262" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1215 310 C1215 448 204 448 204 318" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="10 8" marker-end="url(#arrow)"/>
  <rect x="126" y="420" width="344" height="150" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="150" y="456" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Review questions</text>
  <text x="150" y="488" font-family="Arial, sans-serif" font-size="14" fill="#334155">Feasible curvature, acceleration, jerk</text>
  <text x="150" y="516" font-family="Arial, sans-serif" font-size="14" fill="#334155">Actuator delay and saturation</text>
  <text x="150" y="544" font-family="Arial, sans-serif" font-size="14" fill="#334155">Controller and planner handoff</text>
  <rect x="526" y="420" width="344" height="150" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="550" y="456" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Problem classes</text>
  <text x="550" y="488" font-family="Arial, sans-serif" font-size="14" fill="#334155">Primary: control and safety filters</text>
  <text x="550" y="516" font-family="Arial, sans-serif" font-size="14" fill="#334155">Supporting: planning and state estimation</text>
  <text x="550" y="544" font-family="Arial, sans-serif" font-size="14" fill="#334155">Not central: perception semantics</text>
  <rect x="926" y="420" width="344" height="150" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="950" y="456" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Failure diagnosis</text>
  <text x="950" y="488" font-family="Arial, sans-serif" font-size="14" fill="#334155">Trajectory looks feasible upstream</text>
  <text x="950" y="516" font-family="Arial, sans-serif" font-size="14" fill="#334155">Controller exposes missing tire limits</text>
  <text x="950" y="544" font-family="Arial, sans-serif" font-size="14" fill="#334155">Logs show command saturation</text>
</svg>
