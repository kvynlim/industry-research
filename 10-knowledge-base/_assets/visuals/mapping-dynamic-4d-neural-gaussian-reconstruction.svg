<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc" data-diagram-kind="representation-comparison">
  <title id="title">dynamic 4D scene decomposition</title>
  <desc id="desc">dynamic 4D scene decomposition showing pose and calibration inputs, static infrastructure layer, dynamic actor layer, temporal model, rendered outputs, and validation boundary.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1400" height="720" fill="#f8fafc"/>
  <rect x="42" y="38" width="1316" height="644" rx="20" fill="#ffffff" stroke="#d9e2ef" filter="url(#shadow)"/>
  <text x="80" y="88" font-size="30" font-weight="800" fill="#0f172a">dynamic 4D scene decomposition</text>
  <text x="80" y="122" font-size="16" font-weight="600" fill="#475569">inputs become static and dynamic layers, temporal motion, rendered outputs, and validation-gated map evidence</text>
  <rect x="80" y="144" width="1240" height="2" fill="#dbeafe"/>

  <!-- layout:representation-comparison -->
  <rect x="76" y="194" width="220" height="370" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
  <text x="186" y="230" text-anchor="middle" font-size="18" font-weight="800" fill="#1e40af">inputs</text>
  <rect x="104" y="260" width="164" height="48" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="186" y="290" text-anchor="middle" font-size="14" font-weight="800" fill="#1e3a8a">pose + trajectory</text>
  <rect x="104" y="326" width="164" height="48" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="186" y="356" text-anchor="middle" font-size="14" font-weight="800" fill="#075985">calibration</text>
  <rect x="104" y="392" width="164" height="48" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="186" y="422" text-anchor="middle" font-size="14" font-weight="800" fill="#312e81">tracks + boxes</text>
  <rect x="104" y="458" width="164" height="48" rx="10" fill="#f0fdfa" stroke="#0f766e" stroke-width="2"/>
  <text x="186" y="488" text-anchor="middle" font-size="14" font-weight="800" fill="#134e4a">occupancy priors</text>
  <text x="186" y="530" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">camera, LiDAR, time</text>

  <line x1="306" y1="379" x2="360" y2="379" stroke="#64748b" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="376" y="194" width="294" height="370" rx="16" fill="#f8fafc" stroke="#334155" stroke-width="3"/>
  <text x="523" y="230" text-anchor="middle" font-size="18" font-weight="800" fill="#0f172a">scene layers</text>
  <rect x="406" y="264" width="234" height="106" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="3"/>
  <text x="523" y="294" text-anchor="middle" font-size="16" font-weight="800" fill="#166534">static infrastructure</text>
  <path d="M430 340 H616" stroke="#166534" stroke-width="5" stroke-linecap="round"/>
  <rect x="456" y="308" width="28" height="32" fill="#bbf7d0" stroke="#166534"/>
  <rect x="532" y="304" width="22" height="36" fill="#bbf7d0" stroke="#166534"/>
  <line x1="592" y1="306" x2="592" y2="340" stroke="#166534" stroke-width="4"/>
  <circle cx="592" cy="300" r="6" fill="#16a34a"/>
  <rect x="406" y="404" width="234" height="106" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/>
  <text x="523" y="434" text-anchor="middle" font-size="16" font-weight="800" fill="#c2410c">dynamic actors</text>
  <rect x="440" y="464" width="58" height="24" rx="6" fill="#fed7aa" stroke="#c2410c" stroke-width="2"/>
  <circle cx="454" cy="492" r="8" fill="#c2410c"/>
  <circle cx="486" cy="492" r="8" fill="#c2410c"/>
  <path d="M552 488 C560 456 592 456 600 488" fill="#ffedd5" stroke="#c2410c" stroke-width="2"/>
  <circle cx="576" cy="448" r="10" fill="#ea580c"/>

  <line x1="680" y1="379" x2="734" y2="379" stroke="#64748b" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="750" y="194" width="224" height="370" rx="16" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
  <text x="862" y="230" text-anchor="middle" font-size="18" font-weight="800" fill="#5b21b6">temporal model</text>
  <path d="M800 338 C842 288 886 392 928 342" fill="none" stroke="#7c3aed" stroke-width="5" stroke-linecap="round"/>
  <path d="M798 414 C846 462 884 358 930 408" fill="none" stroke="#a855f7" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 8"/>
  <circle cx="800" cy="338" r="8" fill="#7c3aed"/>
  <circle cx="862" cy="366" r="8" fill="#7c3aed"/>
  <circle cx="928" cy="342" r="8" fill="#7c3aed"/>
  <rect x="785" y="464" width="154" height="42" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="862" y="490" text-anchor="middle" font-size="14" font-weight="800" fill="#4c1d95">deformation + flow</text>
  <text x="862" y="526" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">motion over time t</text>

  <line x1="984" y1="379" x2="1038" y2="379" stroke="#64748b" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="1054" y="194" width="250" height="370" rx="16" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/>
  <text x="1179" y="230" text-anchor="middle" font-size="18" font-weight="800" fill="#0e7490">rendered outputs</text>
  <rect x="1088" y="262" width="182" height="54" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
  <text x="1179" y="296" text-anchor="middle" font-size="15" font-weight="800" fill="#164e63">RGB novel views</text>
  <rect x="1088" y="338" width="182" height="54" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="1179" y="372" text-anchor="middle" font-size="15" font-weight="800" fill="#075985">depth renders</text>
  <rect x="1088" y="414" width="182" height="54" rx="10" fill="#f0f9ff" stroke="#0369a1" stroke-width="2"/>
  <text x="1179" y="448" text-anchor="middle" font-size="15" font-weight="800" fill="#0c4a6e">LiDAR renders</text>
  <rect x="1088" y="490" width="182" height="42" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="1179" y="516" text-anchor="middle" font-size="14" font-weight="800" fill="#92400e">occupancy caveat</text>

  <rect x="372" y="604" width="932" height="54" rx="16" fill="#fff1f2" stroke="#e11d48" stroke-width="3" stroke-dasharray="10 8"/>
  <text x="838" y="626" text-anchor="middle" font-size="17" font-weight="800" fill="#9f1239">validation boundary</text>
  <text x="838" y="648" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">simulation, visual QA, and map-cleaning assets need independent pose, geometry, uncertainty, and safety checks</text>
  <path d="M1179 574 V596" stroke="#64748b" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>
