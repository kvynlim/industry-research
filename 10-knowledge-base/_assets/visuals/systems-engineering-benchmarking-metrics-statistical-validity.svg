<rect x="534" y="196" width="64" height="380" rx="16" fill="#fee2e2" stroke="#e11d48" stroke-width="4"/>
<text x="566" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#991b1b">firewall</text>
<rect x="750" y="258" width="230" height="90" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="865" y="309" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">metrics</text>

<rect x="1010" y="426" width="230" height="90" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
