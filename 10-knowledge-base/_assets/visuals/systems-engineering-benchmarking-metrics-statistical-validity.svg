<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc" data-diagram-kind="benchmark-split-firewall">
  <title id="title">benchmark evidence pipeline</title>
  <desc id="desc">benchmark evidence pipeline from scenario sampling and split design to metrics, confidence intervals, statistical test, and release decision.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1400" height="720" fill="#f8fafc"/>
  <rect x="42" y="38" width="1316" height="644" rx="20" fill="#ffffff" stroke="#d9e2ef" filter="url(#shadow)"/>
  <text x="80" y="88" font-size="30" font-weight="800" fill="#0f172a">benchmark evidence pipeline</text>
  <text x="80" y="122" font-size="16" font-weight="600" fill="#475569">benchmark evidence pipeline from scenario sampling and split design to metrics, confidence intervals, statistical test, and release decision.</text>
  <rect x="80" y="144" width="1240" height="2" fill="#dbeafe"/>

<!-- layout:benchmark-split-firewall -->
<rect x="130" y="258" width="230" height="90" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
