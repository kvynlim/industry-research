<text x="470" y="239" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">factors</text>

<rect x="706" y="170" width="220" height="78" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="816" y="215" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">linearization</text>

<rect x="1010" y="222" width="220" height="78" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
<text x="1120" y="267" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">incremental update</text>

