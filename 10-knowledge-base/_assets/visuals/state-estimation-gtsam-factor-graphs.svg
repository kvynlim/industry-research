<text x="432" y="545" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">marginal</text>

<rect x="888" y="506" width="220" height="78" rx="14" fill="#ffe4e6" stroke="#e11d48" stroke-width="2"/>
<text x="998" y="551" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">and custom factor</text>
<text x="998" y="569" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">lifecycle</text>

<text x="700" y="606" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">geometry makes frames, rays, timing, and residuals inspectable</text>

