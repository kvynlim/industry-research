<text x="580" y="319" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">lookup</text>

<circle cx="700" cy="436" r="54" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
<text x="700" y="441" text-anchor="middle" font-size="14" font-weight="700" fill="#172033">straight-through</text>
