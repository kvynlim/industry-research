<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc" data-diagram-kind="objective-landscape">
  <title id="title">residual audit flow</title>
  <desc id="desc">residual audit flow from measurement model to whitened residual and diagnostics.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1400" height="720" fill="#f8fafc"/>
  <rect x="42" y="38" width="1316" height="644" rx="20" fill="#ffffff" stroke="#d9e2ef" filter="url(#shadow)"/>
  <text x="80" y="88" font-size="30" font-weight="800" fill="#0f172a">residual audit flow</text>
  <text x="80" y="122" font-size="16" font-weight="600" fill="#475569">residual audit flow from measurement model to whitened residual and diagnostics.</text>
  <rect x="80" y="144" width="1240" height="2" fill="#dbeafe"/>

<!-- layout:objective-landscape -->
<rect x="120" y="202" width="560" height="360" rx="16" fill="url(#grid)" stroke="#94a3b8" stroke-width="2"/>
<ellipse cx="420" cy="370" rx="230" ry="128" fill="none" stroke="#2563eb" stroke-width="3" opacity="0.78"/>
<ellipse cx="444" cy="380" rx="192" ry="108" fill="none" stroke="#16a34a" stroke-width="3" opacity="0.78"/>
<ellipse cx="468" cy="390" rx="154" ry="88" fill="none" stroke="#ea580c" stroke-width="3" opacity="0.78"/>
<ellipse cx="492" cy="400" rx="116" ry="68" fill="none" stroke="#0891b2" stroke-width="3" opacity="0.78"/>
<polyline points="224,488 302,438 366,414 428,378 506,350" fill="none" stroke="#e11d48" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<circle cx="506" cy="350" r="34" fill="#ffe4e6" stroke="#e11d48" stroke-width="3"/>
<text x="506" y="355" text-anchor="middle" font-size="14" font-weight="700" fill="#172033">measurement</text>
<text x="506" y="372" text-anchor="middle" font-size="14" font-weight="700" fill="#172033">model</text>
<rect x="780" y="224" width="230" height="84" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="895" y="272" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">whitened residual</text>

<rect x="940" y="386" width="230" height="84" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
<text x="1055" y="434" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">diagnostics</text>

<line x1="1010" y1="310" x2="1010" y2="382" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="790" y="604" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">objective geometry shows descent, curvature, and basins</text>

</svg>
