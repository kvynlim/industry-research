<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc" data-diagram-kind="road-corridor-geometry">
  <title id="title">road centerline</title>
  <desc id="desc">road centerline with Frenet `s` and `d` axes, sampled lateral offsets, jerk-optimal profile, vehicle envelope, and collision-check corridor.</desc>
