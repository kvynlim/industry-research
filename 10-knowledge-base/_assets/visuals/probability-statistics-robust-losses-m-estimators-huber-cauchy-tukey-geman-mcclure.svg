<!-- variant:robust-loss-comparison -->
<text x="80" y="180" font-size="14" font-weight="700" fill="#475569">Scalar view: rho_r(r), psi(r), w(r)=psi(r)/r. Solver APIs often use s=||e||^2 after whitening.</text>
