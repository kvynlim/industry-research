<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc">
  <title id="title">inlier/outlier scatter</title>
  <desc id="desc">inlier/outlier scatter with RANSAC hypotheses, consensus set, robust loss curve, hypothesis-test threshold, and failure diagnostics.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1400" height="720" fill="#f8fafc"/>
  <rect x="42" y="38" width="1316" height="644" rx="20" fill="#ffffff" stroke="#d9e2ef" filter="url(#shadow)"/>
  <text x="80" y="88" font-size="30" font-weight="800" fill="#0f172a">inlier/outlier scatter</text>
  <text x="80" y="122" font-size="16" font-weight="600" fill="#475569">inlier/outlier scatter with RANSAC hypotheses, consensus set, robust loss curve, hypothesis-test threshold, and failure diagnostics.</text>
  <rect x="80" y="144" width="1240" height="2" fill="#dbeafe"/>
<rect x="88" y="286" width="180" height="108" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="178" y="346" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">inlier/outlier</text>
<text x="178" y="367" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">scatter</text>

<line x1="271" y1="340" x2="295" y2="340" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="302" y="286" width="180" height="108" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="392" y="346" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">RANSAC hypotheses</text>

<line x1="485" y1="340" x2="509" y2="340" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="516" y="286" width="180" height="108" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="606" y="346" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">consensus set</text>

<line x1="699" y1="340" x2="723" y2="340" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="730" y="286" width="180" height="108" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
<text x="820" y="346" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">robust loss curve</text>

<line x1="913" y1="340" x2="937" y2="340" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="944" y="286" width="180" height="108" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="1034" y="346" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">hypothesis-test</text>
<text x="1034" y="367" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">threshold</text>

<line x1="1127" y1="340" x2="1151" y2="340" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="1158" y="286" width="180" height="108" rx="14" fill="#ffe4e6" stroke="#e11d48" stroke-width="2"/>
<text x="1248" y="346" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">and failure</text>
<text x="1248" y="367" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">diagnostics</text>


<path d="M1248 420 C738 560 298 560 178 420" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="700" y="586" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">validation and diagnostics feed the next pass</text>
</svg>
