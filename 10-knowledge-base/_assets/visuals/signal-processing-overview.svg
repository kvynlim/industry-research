<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc" data-diagram-kind="signal-processing-chain">
  <title id="title">Signal Processing Foundations for Autonomy</title>
  <desc id="desc">section-level autonomy-role diagram showing signal processing foundations, autonomy problem classes, stack interfaces, reading paths, and failure diagnosis.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#0891b2"/>
    </marker>
  </defs>
  <rect width="1400" height="720" fill="#f8fafc"/>
  <rect x="54" y="48" width="1292" height="624" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="92" y="96" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Signal Processing Foundations for Autonomy</text>
  <text x="92" y="128" font-family="Arial, sans-serif" font-size="16" fill="#475569">Sampling, filtering, FFTs, radar feature formation, CFAR, and raw-to-feature diagnostics.</text>
  <!-- layout:signal-processing-chain -->
  <rect x="102" y="194" width="172" height="92" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="188" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">Sampling</text>
  <text x="188" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">rate and timing</text>
  <rect x="336" y="194" width="172" height="92" rx="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="422" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">Filtering</text>
  <text x="422" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">delay and response</text>
  <rect x="570" y="194" width="172" height="92" rx="14" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
  <text x="656" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">FFT window</text>
  <text x="656" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">bins and leakage</text>
  <rect x="804" y="194" width="172" height="92" rx="14" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="890" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">Radar tensor</text>
  <text x="890" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">range, velocity, angle</text>
  <rect x="1038" y="194" width="172" height="92" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="1124" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">CFAR</text>
  <text x="1124" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">adaptive threshold</text>
  <line x1="274" y1="240" x2="328" y2="240" stroke="#0891b2" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="508" y1="240" x2="562" y2="240" stroke="#0891b2" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="742" y1="240" x2="796" y2="240" stroke="#0891b2" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="976" y1="240" x2="1030" y2="240" stroke="#0891b2" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="200" y="394" width="276" height="138" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="224" y="430" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Assumption checks</text>
  <text x="224" y="464" font-family="Arial, sans-serif" font-size="14" fill="#334155">aliasing, clutter, blind speeds</text>
  <text x="224" y="494" font-family="Arial, sans-serif" font-size="14" fill="#334155">window and threshold choice</text>
  <rect x="562" y="394" width="276" height="138" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="586" y="430" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Feature contract</text>
  <text x="586" y="464" font-family="Arial, sans-serif" font-size="14" fill="#334155">detections, confidence, masks</text>
  <text x="586" y="494" font-family="Arial, sans-serif" font-size="14" fill="#334155">intermediate telemetry</text>
  <rect x="924" y="394" width="276" height="138" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="948" y="430" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Failure diagnosis</text>
  <text x="948" y="464" font-family="Arial, sans-serif" font-size="14" fill="#334155">crossing traffic missed</text>
  <text x="948" y="494" font-family="Arial, sans-serif" font-size="14" fill="#334155">velocity or clutter blind spot</text>
</svg>

