<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc" data-diagram-kind="measurement-chain">
  <title id="title">Multi-Sensor Fusion Measurement Models</title>
  <desc id="desc">camera/LiDAR/radar/GNSS/IMU measurements through frames/time alignment, likelihoods, feature/object/track fusion, covariance, and correlation warnings.</desc>
  <defs>
