<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc" data-diagram-kind="learning-roadmap">
  <title id="title">Machine Learning Foundations for Autonomy</title>
  <desc id="desc">machine-learning foundation ladder from linear models and gradients to sequence models, self-supervision, world models, evaluation, and autonomy review.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1400" height="720" fill="#f8fafc"/>
  <rect x="42" y="38" width="1316" height="644" rx="18" fill="#ffffff" stroke="#d9e2ef" filter="url(#shadow)"/>
  <text x="80" y="88" font-size="30" font-weight="800" fill="#0f172a">Machine Learning Foundations for Autonomy</text>
  <text x="80" y="122" font-size="16" font-weight="600" fill="#475569">Linear models and gradients to sequence models, self-supervision, world models, evaluation, and autonomy review.</text>
  <rect x="80" y="144" width="1240" height="2" fill="#dbeafe"/>

  <!-- layout:learning-roadmap -->
  <rect x="92" y="196" width="1206" height="364" rx="16" fill="url(#grid)" stroke="#dbeafe"/>

  <rect x="120" y="250" width="180" height="94" rx="12" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="210" y="288" text-anchor="middle" font-size="16" font-weight="800" fill="#172033">Linear models</text>
  <text x="210" y="314" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">scores and gradients</text>

  <line x1="304" y1="297" x2="362" y2="297" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="370" y="250" width="180" height="94" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="460" y="288" text-anchor="middle" font-size="16" font-weight="800" fill="#172033">Representations</text>
  <text x="460" y="314" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">MLP, CNN, RNN</text>

  <line x1="554" y1="297" x2="612" y2="297" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="620" y="250" width="180" height="94" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="710" y="288" text-anchor="middle" font-size="16" font-weight="800" fill="#172033">Sequence models</text>
  <text x="710" y="314" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">attention and SSM</text>

  <line x1="804" y1="297" x2="862" y2="297" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="870" y="250" width="180" height="94" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="960" y="288" text-anchor="middle" font-size="16" font-weight="800" fill="#172033">Self-supervision</text>
  <text x="960" y="314" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">tokens and objectives</text>

  <line x1="1054" y1="297" x2="1112" y2="297" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="1120" y="250" width="150" height="94" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="1195" y="288" text-anchor="middle" font-size="16" font-weight="800" fill="#172033">World models</text>
  <text x="1195" y="314" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">rollout utility</text>

  <path d="M1195 348 L1195 402 C1195 430 1178 442 1152 442 L1036 442" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
  <rect x="790" y="395" width="240" height="94" rx="12" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="910" y="433" text-anchor="middle" font-size="16" font-weight="800" fill="#172033">Evaluation evidence</text>
  <text x="910" y="459" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">calibration and leakage</text>

  <line x1="786" y1="442" x2="682" y2="442" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="480" y="395" width="198" height="94" rx="12" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
  <text x="579" y="433" text-anchor="middle" font-size="16" font-weight="800" fill="#172033">Autonomy review</text>
  <text x="579" y="459" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">stack handoffs</text>

  <text x="700" y="618" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">The ladder links learned representations, objectives, evaluation, and deployment ownership.</text>
</svg>
