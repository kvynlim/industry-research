<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc" data-diagram-kind="architecture-comparison">
  <title id="title">Sequence Models: RNNs, SSMs, Attention, and Mamba</title>
