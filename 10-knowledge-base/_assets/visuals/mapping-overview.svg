<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc" data-diagram-kind="map-and-planning-stack">
  <title id="title">Mapping Foundations for Autonomy</title>
  <desc id="desc">section-level autonomy-role diagram showing mapping foundations, autonomy problem classes, stack interfaces, reading paths, and failure diagnosis.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#0f766e"/>
    </marker>
  </defs>
  <rect width="1400" height="720" fill="#f8fafc"/>
  <rect x="54" y="48" width="1292" height="624" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="92" y="96" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Mapping Foundations for Autonomy</text>
  <text x="92" y="128" font-family="Arial, sans-serif" font-size="16" fill="#475569">Persistent spatial memory with provenance, dynamic separation, and planning-facing layers.</text>
  <!-- layout:map-and-planning-stack -->
  <rect x="118" y="198" width="198" height="104" rx="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
