<text x="466" y="338" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">arrival time</text>

<line x1="564" y1="332" x2="598" y2="332" stroke="#64748b" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow)"/>
