<text x="780" y="259" text-anchor="middle" font-size="14" font-weight="700" fill="#172033">fixed-lag</text>
<text x="780" y="276" text-anchor="middle" font-size="14" font-weight="700" fill="#172033">smoother</text>
<circle cx="1034" cy="390" r="58" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/>
<text x="1034" y="395" text-anchor="middle" font-size="14" font-weight="700" fill="#172033">retrodiction</text>
<text x="1034" y="412" text-anchor="middle" font-size="14" font-weight="700" fill="#172033">update</text>
<rect x="363" y="281" width="74" height="74" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/>
<text x="400" y="323" text-anchor="middle" font-size="13" font-weight="800" fill="#172033">stale</text>
<text x="400" y="339" text-anchor="middle" font-size="13" font-weight="800" fill="#172033">rejection</text>
<rect x="613" y="281" width="74" height="74" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/>
<text x="650" y="323" text-anchor="middle" font-size="13" font-weight="800" fill="#172033">update</text>
<rect x="873" y="281" width="74" height="74" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
<text x="910" y="323" text-anchor="middle" font-size="13" font-weight="800" fill="#172033">and replay</text>
