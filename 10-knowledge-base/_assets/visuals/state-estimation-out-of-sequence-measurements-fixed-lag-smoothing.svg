<text x="934" y="356" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">update</text>

<line x1="1032" y1="332" x2="1066" y2="332" stroke="#64748b" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="1074" y="286" width="188" height="92" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="1168" y="338" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">stale rejection</text>


<line x1="315" y1="270" x2="366" y2="306" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="438" y1="334" x2="486" y2="376" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
