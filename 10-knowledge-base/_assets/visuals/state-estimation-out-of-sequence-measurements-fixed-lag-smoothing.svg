<line x1="688" y1="306" x2="738" y2="270" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="826" y1="270" x2="876" y2="306" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="948" y1="334" x2="1000" y2="376" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
<circle cx="270" cy="254" r="58" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
