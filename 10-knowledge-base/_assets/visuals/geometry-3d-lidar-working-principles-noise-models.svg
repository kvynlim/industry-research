<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc" data-diagram-kind="beam-noise-model">
  <title id="title">LiDAR point formation diagram</title>
  <desc id="desc">LiDAR point formation diagram showing emitted pulse or chirp, time-of-flight/FMCW measurement, beam angle, reflectance, incidence angle, weather dropout, and range noise.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1400" height="720" fill="#f8fafc"/>
  <rect x="42" y="38" width="1316" height="644" rx="20" fill="#ffffff" stroke="#d9e2ef" filter="url(#shadow)"/>
  <text x="80" y="88" font-size="30" font-weight="800" fill="#0f172a">LiDAR point formation diagram</text>
  <text x="80" y="122" font-size="16" font-weight="600" fill="#475569">LiDAR point formation diagram showing emitted pulse or chirp, time-of-flight/FMCW measurement, beam angle, reflectance, incidence angle, weather dr...</text>
  <rect x="80" y="144" width="1240" height="2" fill="#dbeafe"/>

<!-- layout:beam-noise-model -->
<polygon points="194,474 1040,220 1040,538" fill="#ecfeff" stroke="#0891b2" stroke-width="3" opacity="0.72"/>
<polyline points="194,474 520,410 780,328 1040,220" fill="none" stroke="#0891b2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<polyline points="194,474 530,484 780,502 1040,538" fill="none" stroke="#0891b2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="744" cy="344" r="8" fill="#e11d48" opacity="0.82"/>
<circle cx="842" cy="404" r="6" fill="#e11d48" opacity="0.82"/>
<circle cx="920" cy="502" r="7" fill="#e11d48" opacity="0.82"/>
<circle cx="660" cy="474" r="5" fill="#475569" opacity="0.82"/>
<circle cx="1006" cy="356" r="5" fill="#475569" opacity="0.82"/>
<rect x="120" y="430" width="148" height="88" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
<text x="194" y="480" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">emitted pulse</text>
<text x="194" y="501" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">or chirp</text>

