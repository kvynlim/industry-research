<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc" data-diagram-kind="closed-loop-control">
  <title id="title">receding-horizon control loop</title>
  <desc id="desc">receding-horizon control loop showing state estimate, prediction model, constraints, cost, QP/NLP solve, first-control application, and warm-start feedback.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1400" height="720" fill="#f8fafc"/>
  <rect x="42" y="38" width="1316" height="644" rx="20" fill="#ffffff" stroke="#d9e2ef" filter="url(#shadow)"/>
  <text x="80" y="88" font-size="30" font-weight="800" fill="#0f172a">receding-horizon control loop</text>
  <text x="80" y="122" font-size="16" font-weight="600" fill="#475569">receding-horizon control loop showing state estimate, prediction model, constraints, cost, QP/NLP solve, first-control application, and warm-start...</text>
  <rect x="80" y="144" width="1240" height="2" fill="#dbeafe"/>

<!-- layout:closed-loop-control -->
<rect x="154" y="278" width="210" height="90" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="259" y="329" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">state estimate</text>

<rect x="430" y="210" width="210" height="90" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="535" y="261" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">prediction model</text>

<rect x="760" y="210" width="210" height="90" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="865" y="261" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">constraints</text>

<rect x="1036" y="278" width="210" height="90" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
<text x="1141" y="329" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">cost</text>

<rect x="595" y="460" width="210" height="90" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="700" y="511" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">QP/NLP solve</text>

<line x1="366" y1="323" x2="426" y2="266" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="642" y1="255" x2="756" y2="255" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="972" y1="266" x2="1032" y2="323" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M1138 374 C1072 560 846 614 704 552" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<path d="M596 506 C360 590 170 516 244 372" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<path d="M746 462 C878 378 922 330 924 302" fill="none" stroke="#16a34a" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="700" y="618" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">closed feedback loop keeps plans tied to measured state</text>

