<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc" data-diagram-kind="evaluation-firewall">
  <title id="title">evaluation split firewall</title>
  <desc id="desc">evaluation split firewall showing train/validation/test/calibration partitions, leakage paths, reliability diagram, and uncertainty interval.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1400" height="720" fill="#f8fafc"/>
  <rect x="42" y="38" width="1316" height="644" rx="20" fill="#ffffff" stroke="#d9e2ef" filter="url(#shadow)"/>
  <text x="80" y="88" font-size="30" font-weight="800" fill="#0f172a">evaluation split firewall</text>
  <text x="80" y="122" font-size="16" font-weight="600" fill="#475569">evaluation split firewall showing train/validation/test/calibration partitions, leakage paths, reliability diagram, and uncertainty interval.</text>
  <rect x="80" y="144" width="1240" height="2" fill="#dbeafe"/>

<!-- layout:evaluation-firewall -->
<rect x="148" y="238" width="236" height="90" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="266" y="289" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">train/validation/test/calibration</text>
<text x="266" y="310" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">partitions</text>

<rect x="148" y="430" width="236" height="90" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="266" y="481" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">leakage paths</text>

<rect x="568" y="196" width="70" height="380" rx="18" fill="#fee2e2" stroke="#e11d48" stroke-width="4"/>
<text x="604" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#991b1b">no leakage</text>
<rect x="792" y="250" width="236" height="90" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="910" y="301" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">reliability diagram</text>

<rect x="1010" y="440" width="236" height="90" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
<text x="1128" y="491" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">and uncertainty</text>
<text x="1128" y="512" text-anchor="middle" font-size="17" font-weight="700" fill="#172033">interval</text>

<line x1="386" y1="283" x2="564" y2="283" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="640" y1="283" x2="788" y2="294" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M910 342 C930 420 980 456 1008 470" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>

</svg>
