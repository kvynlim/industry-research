<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc" data-diagram-kind="geodesy-chain">
  <title id="title">WGS84 to ECEF to ENU to projected local-map chain</title>
  <desc id="desc">WGS84 to ECEF to ENU to projected local-map chain with datum/projection distortion and localization error budget.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1400" height="720" fill="#f8fafc"/>
  <rect x="42" y="38" width="1316" height="644" rx="20" fill="#ffffff" stroke="#d9e2ef" filter="url(#shadow)"/>
  <text x="80" y="88" font-size="30" font-weight="800" fill="#0f172a">WGS84 to ECEF to ENU to projected local-map chain</text>
  <text x="80" y="122" font-size="16" font-weight="600" fill="#475569">WGS84 to ECEF to ENU to projected local-map chain with datum/projection distortion and localization error budget.</text>
  <rect x="80" y="144" width="1240" height="2" fill="#dbeafe"/>

<!-- layout:geodesy-chain -->
<rect x="166" y="318" width="180" height="92" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="256" y="370" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">WGS84</text>

<line x1="350" y1="364" x2="380" y2="364" stroke="#64748b" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="388" y="318" width="180" height="92" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="478" y="370" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">ECEF</text>

<line x1="572" y1="364" x2="602" y2="364" stroke="#64748b" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="610" y="318" width="180" height="92" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="700" y="370" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">ENU</text>

<line x1="794" y1="364" x2="824" y2="364" stroke="#64748b" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="832" y="318" width="180" height="92" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
<text x="922" y="370" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">projected</text>
<text x="922" y="388" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">local-map chain</text>

<line x1="1016" y1="364" x2="1046" y2="364" stroke="#64748b" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="1054" y="318" width="180" height="92" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="1144" y="370" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">datum/projection</text>
<text x="1144" y="388" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">distortion</text>


<path d="M206 532 C420 440 620 590 828 500 C980 434 1078 482 1186 390" fill="none" stroke="#16a34a" stroke-width="5" stroke-dasharray="18 14"/>
<text x="700" y="604" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">earth frame to local map chain</text>

</svg>
